<!DOCTYPE html>

<html>
<head>
<title>Uber Pro Max Statement</title>

<style>
body { 
    font-family: Arial; 
    padding:10px; 
    margin:0; 
    background:#f5f5f5;
}

table { table-layout: fixed; }

th:nth-child(1), td:nth-child(1) { width: 120px; }
th:nth-child(2), td:nth-child(2) { width: 120px; }
th:nth-child(3), td:nth-child(3) { width: 120px; }
th:nth-child(4), td:nth-child(4) { width: 120px; }
th:nth-child(5), td:nth-child(5) { width: 120px; }

.btn-group{
    display:flex;
    flex-wrap:wrap;
    gap:6px;
    margin-bottom:10px;
}

button,select{
    flex:1 1 45%;
    padding:10px;
    font-size:14px;
    border:none;
    border-radius:6px;
    background:#222;
    color:#fff;
}

.table-wrap{
    overflow-x:auto;
    background:#fff;
    border-radius:8px;
}

table{
    width:100%;
    border-collapse:collapse;
    font-size:12px;
    min-width:520px;
}

th,td{
    border:1px solid #ddd;
    padding:6px;
    text-align:center;
}

th{
    background:#000;
    color:#fff;
    position:sticky;
    top:0;
}

input,select{
    width:95%;
    padding:6px;
    font-size:14px;
    border:none;
    outline:none;
    text-align:center;
    background:transparent;
}

.total{
    background:#eaeaea;
    font-weight:bold;
}

#filterType{
    color:black;
    background:white;
}

td select{
    color:black;
}

/* LOGIN UI */
.login-box{
    display:flex;
    gap:6px;
    margin-bottom:10px;
    flex-wrap:wrap;
}

.login-box input{
    flex:1 1 40%;
    padding:8px;
    border:1px solid #ccc;
}
</style>

</head>

<body>

<h2 style="text-align:center;">UBER / LYFT PRO MAX</h2>

<!-- LOGIN UI (READY BUT NEEDS FIREBASE TO WORK) -->

<div class="login-box">
<input id="email" placeholder="Email">
<input id="password" type="password" placeholder="Password">
<button onclick="fakeLogin()">LOGIN</button>
<button onclick="fakeSignup()">SIGN UP</button>
</div>

<div class="btn-group">

<button onclick="addRow()">➕ ADD</button> <button onclick="deleteRow()">❌ DELETE</button> <button onclick="saveData()">💾 SAVE</button> <button onclick="clearData()">🗑️ CLEAR</button> <button onclick="takeScreenshot()">📸 IMAGE</button> <button onclick="window.print()">🖨️ PDF</button>

<button onclick="saveToCloud()">☁️ CLOUD SAVE</button> <button onclick="loadFromCloud()">📥 CLOUD LOAD</button>

<select id="filterType">
<option value="all">ALL</option>
<option value="weekly">WEEKLY</option>
<option value="monthly">MONTHLY</option>
<option value="yearly">YEARLY</option>
</select>

</div>

<div class="table-wrap">
<table id="captureArea">

<tr>
<th>DATE</th>
<th>GAS</th>
<th>OTHERS</th>
<th>EARNING</th>
<th>TYPE</th>
</tr>

<tbody id="mainRows"></tbody>

<tr class="total"><td>TOTAL GAS</td><td><input id="gasTotal" readonly></td><td colspan="3"></td></tr>
<tr class="total"><td>TOTAL OTHERS</td><td><input id="othersTotal" readonly></td><td colspan="3"></td></tr>
<tr class="total"><td>TOTAL EARNING</td><td><input id="earningTotal" readonly></td><td colspan="3"></td></tr>

<tr>
<td>START MILES</td>
<td><input id="startMiles"></td>
<td>CLOSE MILES</td>
<td><input id="closeMiles"></td>
<td><input id="totalMiles" readonly></td>
</tr>

<tr class="total">
<td colspan="2">MILE COST</td>
<td colspan="3"><input id="mileCost" readonly></td>
</tr>

<tr>
<td>TOLL START</td><td><input id="tollStart"></td>
<td>TOLL CLOSE</td><td><input id="tollClose"></td>
<td><input id="tollSpent" readonly></td>
</tr>

<tr class="total">
<td colspan="2">TOTAL COST</td>
<td colspan="3"><input id="totalCost" readonly></td>
</tr>

<tr class="total">
<td colspan="2">CURRENT EARNING</td>
<td colspan="3"><input id="currentEarning" readonly></td>
</tr>

<tr class="total">
<td colspan="2">PROFIT</td>
<td colspan="3"><input id="weeklyProfit" readonly></td>
</tr>

</table>
</div>

<script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>

<script>

/* ================= WORKING CORE ================= */

const payTypes=["CASH","UBER","LYFT","ZELLE","CASHAPP","VENMO","SQUARE"];
const tbody=document.getElementById("mainRows");

function createRow(){
    let tr=document.createElement("tr");
    let options=payTypes.map(t=>`<option>${t}</option>`).join("");
    tr.innerHTML=`
        <td><input type="date"></td>
        <td><input class="gas"></td>
        <td><input class="others"></td>
        <td><input class="earning"></td>
        <td><select>${options}</select></td>
    `;
    return tr;
}

for(let i=0;i<2;i++) tbody.appendChild(createRow());

function addRow(){ tbody.appendChild(createRow()); }

function deleteRow(){
    if(tbody.rows.length>1)
        tbody.removeChild(tbody.lastElementChild);
}

function f(n){ return (n||0).toFixed(2); }

function calculateAll(){

    let gas=[...document.querySelectorAll(".gas")].reduce((a,b)=>a+(+b.value||0),0);
    let oth=[...document.querySelectorAll(".others")].reduce((a,b)=>a+(+b.value||0),0);
    let earn=[...document.querySelectorAll(".earning")].reduce((a,b)=>a+(+b.value||0),0);

    let miles=(+closeMiles.value||0)-(+startMiles.value||0);
    let mileCost=miles*0.30;
    let toll=Math.max(0,(+tollClose.value||0)-(+tollStart.value||0));

    let total=gas+oth+mileCost+toll;
    let current=earn-total;

    gasTotal.value=f(gas);
    othersTotal.value=f(oth);
    earningTotal.value=f(earn);
    totalMiles.value=f(miles);
    mileCost.value=f(mileCost);
    tollSpent.value=f(toll);
    totalCost.value=f(total);
    currentEarning.value=f(current);
    weeklyProfit.value=f(current);

    currentEarning.style.color=current>=0?"green":"red";
}

/* SAVE LOCAL */
function saveData(){
    let data=[...document.querySelectorAll("input,select")].map(i=>i.value);
    localStorage.setItem("uberData",JSON.stringify(data));
}

function loadData(){
    let data=JSON.parse(localStorage.getItem("uberData")||"[]");
    document.querySelectorAll("input,select").forEach((i,idx)=>{
        if(data[idx]) i.value=data[idx];
    });
}

/* SCREENSHOT */
function takeScreenshot(){
    html2canvas(document.querySelector("#captureArea"))
    .then(c=>{
        let a=document.createElement("a");
        a.download="statement.png";
        a.href=c.toDataURL();
        a.click();
    });
}

/* CLOUD (SAFE MOCK VERSION) */
function saveToCloud(){
    localStorage.setItem("cloudBackup", localStorage.getItem("uberData"));
    alert("Saved to CLOUD (local mock)");
}

function loadFromCloud(){
    let data=localStorage.getItem("cloudBackup");
    if(data){
        localStorage.setItem("uberData",data);
        location.reload();
    } else {
        alert("No cloud data found");
    }
}

/* FAKE LOGIN (UI ONLY) */
function fakeLogin(){
    alert("Login UI ready (Firebase connect করলে real হবে)");
}

function fakeSignup(){
    alert("Signup UI ready (Firebase connect করলে real হবে)");
}

/* AUTO */
document.addEventListener("input",()=>{
    calculateAll();
    saveData();
});

window.onload=()=>{
    loadData();
    calculateAll();
};

</script>

</body>
</html>
